name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JS deps
        run: npm install

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Python executor
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path python-dist | Out-Null
          pyinstaller python/code_executor.py --onefile --name code_executor --distpath python-dist/code_executor --workpath build/pyinstaller --specpath build/pyinstaller

      - name: Validate Electron main syntax
        run: node --check electron/main.mjs

      - name: Build Next app
        shell: bash
        run: npm run build
        env:
          LOWPRIZO_API_BASE_URL: ${{ secrets.LOWPRIZO_API_BASE_URL }}

      - name: Build Electron artifacts
        run: npm run package:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
