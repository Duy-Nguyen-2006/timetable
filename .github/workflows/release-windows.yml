name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/_reusable-windows-build.yml
    permissions:
      contents: write
    with:
      artifact_name: windows-release
      publish_release: ${{ startsWith(github.ref, 'refs/tags/v') }}
    secrets:
      LOWPRIZO_API_BASE_URL: ${{ secrets.LOWPRIZO_API_BASE_URL }}
