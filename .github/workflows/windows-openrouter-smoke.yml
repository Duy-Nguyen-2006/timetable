name: Windows OpenRouter Smoke Test

on:
  workflow_dispatch:
    inputs:
      smoke_command:
        description: "Optional custom command to start/test the app"
        required: false
        default: ""

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
  OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENAI_BASE_URL: https://openrouter.ai/api/v1
  MODEL_NAME: deepseek/deepseek-v4-flash
  AI_MODEL: deepseek/deepseek-v4-flash
  LLM_MODEL: deepseek/deepseek-v4-flash
  GITHUB_TOKEN: ${{ secrets.TEST_GH_TOKEN }}
  GH_TOKEN: ${{ secrets.TEST_GH_TOKEN }}
  CI: "true"

jobs:
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TEST_GH_TOKEN }}
          persist-credentials: false

      - name: Validate electron main syntax (fail fast)
        shell: pwsh
        run: node --check electron/main.mjs

      - name: Show environment info
        shell: pwsh
        run: |
          Write-Host "OS:"
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsArchitecture | Format-List
          Write-Host "Node:"
          try { node --version } catch { Write-Host "node not installed yet" }
          Write-Host "NPM:"
          try { npm --version } catch { Write-Host "npm not installed yet" }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify required secrets present
        shell: pwsh
        run: |
          if (-not $env:OPENROUTER_API_KEY) {
            Write-Error "Missing secret OPENROUTER_API_KEY"
            exit 1
          }
          Write-Host "Secrets check: OK"

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: OpenRouter connectivity probe
        shell: pwsh
        run: node scripts/smoke-openrouter.mjs

      - name: Datasets parser smoke (datasets.txt)
        shell: pwsh
        run: npx tsx scripts/smoke-datasets.ts

      - name: Build
        shell: pwsh
        run: npm run build

      - name: Test
        shell: pwsh
        run: npm test

      - name: Run smoke command
        shell: pwsh
        run: |
          $custom = "${{ github.event.inputs.smoke_command }}"
          if ($custom -and $custom.Trim().Length -gt 0) {
            $cmd = $custom
          } else {
            $cmd = "npm run start"
          }

          Write-Host "Running smoke command: $cmd"
          $logFile = "windows-smoke.log"

          $process = Start-Process `
            -FilePath "cmd.exe" `
            -ArgumentList "/c $cmd > $logFile 2>&1" `
            -PassThru `
            -WindowStyle Hidden

          $deadline = (Get-Date).AddSeconds(30)
          while (-not $process.HasExited -and (Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
          }

          if ($process.HasExited) {
            $code = $process.ExitCode
            Write-Host "Process exited. ExitCode=$code"
            Write-Host "---- Smoke log ----"
            if (Test-Path $logFile) { Get-Content $logFile }

            if ($code -ne 0) {
              Write-Error "Smoke command failed on Windows."
              exit 1
            }
            Write-Host "PASS: Smoke command completed successfully."
          }
          else {
            Write-Host "App still running after 30s. Treating as started OK."
            Write-Host "---- Smoke log ----"
            if (Test-Path $logFile) { Get-Content $logFile }

            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Write-Host "PASS: App started on Windows and did not crash immediately."
          }

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-logs
          path: |
            windows-smoke.log
            *.log
          if-no-files-found: ignore

  windows-package:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TEST_GH_TOKEN }}
          persist-credentials: false

      - name: Validate electron main syntax (fail fast)
        shell: pwsh
        run: node --check electron/main.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps (ortools + pyinstaller)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install JS deps
        shell: pwsh
        run: npm ci

      - name: Cache Python executor binary
        id: cache-executor
        uses: actions/cache@v4
        with:
          path: python-dist
          key: pyexec-${{ runner.os }}-${{ hashFiles('requirements.txt', 'python/code_executor.py', 'python/validator_engine.py', 'sandbox/**', 'scripts/build_executor.mjs') }}

      - name: Build Python executor (code_executor.exe)
        if: steps.cache-executor.outputs.cache-hit != 'true'
        shell: pwsh
        run: npm run build:executor:win

      - name: Verify code_executor.exe present
        shell: pwsh
        run: |
          $bin = "python-dist/code_executor.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Missing $bin"
            exit 1
          }
          $size = (Get-Item $bin).Length
          Write-Host "code_executor.exe size: $size bytes"
          if ($size -lt 5000000) {
            Write-Error "code_executor.exe smaller than expected; PyInstaller likely failed."
            exit 1
          }

      - name: Build Next app
        shell: pwsh
        run: npm run build

      - name: Run electron unit tests
        shell: pwsh
        run: npm run test:electron

      - name: Package Windows installer (electron-builder)
        shell: pwsh
        run: npm run package:win

      - name: Inspect release artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path "release")) {
            Write-Error "release/ directory missing after package:win"
            exit 1
          }
          Get-ChildItem release -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          $exe = Get-ChildItem release -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe artifact found in release/"
            exit 1
          }
          Write-Host "Primary installer: $($exe.FullName) ($([math]::Round($exe.Length/1MB,2)) MB)"

      - name: Upload Windows installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: warn
