name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python -m venv .venv
      - run: ./.venv/bin/pip install -U pip pytest ortools
      - run: npm run lint
      - run: npx tsx scripts/check_constraint_parity.ts --strict
      - run: npx tsx --test "src/**/*.test.ts"
      - run: npm run test:electron
      - run: npm run build
      - name: Provider smoke tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SKIP_PROVIDER_SMOKE: ${{ vars.SKIP_PROVIDER_SMOKE }}
        run: |
          if [ "$SKIP_PROVIDER_SMOKE" = "1" ] || [ -z "$OPENROUTER_API_KEY" ]; then
            SKIP_PROVIDER_SMOKE=1 npm run provider:smoke
          else
            npm run dev &
            server_pid=$!
            trap 'kill $server_pid' EXIT
            for i in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:3000 >/dev/null; then break; fi
              sleep 1
            done
            npm run provider:smoke
          fi
      - run: ./.venv/bin/pytest python/tests
